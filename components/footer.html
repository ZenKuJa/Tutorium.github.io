<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            .footer {
                overflow: hidden;
                background: #333;
                display: flex;
                justify-content: center;
            }

            .footer a {
                float: left;
                display: block;
                color: white;
                text-decoration: none;
                padding: 20px;
                text-align: center;
            }

            .footer a:hover{
                background-color: #ddd;
                color: black;
            }

            @media screen and (max-width: 400px){
                .footer {
                    flex-direction: column;
                }
            }
        </style>
    </head>
    <body>
        <div class="footer">
            <a href="#">About</a>
            <a href="#">Impressum</a>
            <a href="#">Contact</a>
            <a href="#">Copyright</a>
        </div>
    </body>
</html>
