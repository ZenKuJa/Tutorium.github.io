<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            .navbar{
                overflow: hidden;
                background-color: #333;
            }

            .navbar a {
                float: left;
                display: block;
                color: white;
                text-align: center;
                padding: 14px 20px;
                text-decoration: none;
            }

            .navbar a.right {
                float: right;
            }

            .navbar a:hover {
                background-color: #ddd;
                color: black;
            }

            @media screen and (max-width: 400px) {
                .navbar a {
                    float: none;
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div class="navbar">
            <a href="#">Dokumentation</a>
            <a href="#">Präsentation</a>
            <a href="#">Übungen</a>
            <a href="#" class="right">Home</a>
        </div>
    </body>
</html>
