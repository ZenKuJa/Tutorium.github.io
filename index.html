<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tutorium Programmierung 2</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="src/componentLoader.js"></script>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
        }

        .side {
            flex: 30%;
            background-color: #f1f1f1;
            padding: 20px;
        }

        .main {
            flex: 70%;
            background-color: white;
            padding: 20%;
        }

        @media screen and (max-width: 700px) {
            .row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <div id="navbar-container"></div>
    <div class="row">
        <div class="side">
        </div>
        <div class="main"></div>
    </div>
    <div id ="footer-container"></div>
</body>
</html>
