<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tutorium Programmierung 2</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="src/componentLoader.js"></script>
    <script src="src/slideShow.js"></script>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .main {
            flex: 70%;
            background-color: white;
        }

        * {
            box-sizing:border-box
        }

        .page_content {

            margin: 20%;
            margin-top: 50px;
            margin-bottom: 50px;
        }

        /* Slideshow container */
        .slideshow-container {
            position: relative;
            border: 1px solid #7B878D;
            height: 70vh;
        }


        /* Hide the images by default */
        .mySlides {
            display: none;
            width: 100%;
            height: 100%;
        }

        .mySlides img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;

        }

        /* Next & previous buttons */
        .prev, .next {
            top: 45%;
            cursor: pointer;
            position: absolute;
            width: auto;
            padding: 2vh;
            color: #7B878D;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
        }

        /* Position the "next button" to the right */
        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        /* On hover, add a black background color with a little bit see-through */
        .prev:hover, .next:hover {
            background-color: rgba(0,0,0,0.8);
        }

        /* Caption text */
        .text {
            color: black;
            font-size: 15px;
            padding: 8px 12px;
            position: absolute;
            bottom: 8px;
            width: 100%;
            text-align: center;
        }

        /* Number text (1/3 etc) */
        .numbertext {
            color: black;
            font-size: 12px;
            padding: 8px 12px;
            position: absolute;
            top: 0;
        }

        /* The dots/bullets/indicators */
        .dot {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 2px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }

        .active, .dot:hover {
            background-color: #7B878D;
        }

        /* Fading animation */
        .fade {
            animation-name: fade;
            animation-duration: 1.5s;
        }

        @keyframes fade {
            from {opacity: .4}
            to {opacity: 1}
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <div id="navbar-container"></div>
    <div class="page_content">
         <!-- Slideshow container -->
        <div class="slideshow-container">

            <!-- Full-width images with number and caption text -->
            <div class="mySlides">
                <div class="numbertext">1 / 3</div>
                <img src="https://static.wikia.nocookie.net/subnautica/images/1/1e/Hoverfish_Fauna.png" style="width:100%">
                <div class="text">Caption Text</div>
            </div>
        
            <div class="mySlides">
                <div class="numbertext">2 / 3</div>
                <img src="https://static.wikia.nocookie.net/subnautica/images/1/13/Holefish_Fauna.png" style="width:100%">
                <div class="text">Caption Two</div>
            </div>
        
            <div class="mySlides">
                <div class="numbertext">3 / 3</div>
                <img src="https://static.wikia.nocookie.net/subnautica/images/b/bb/Cuddlefish_Fauna.png" style="width:100%">
                <div class="text">Caption Three</div>
            </div>
        
            <!-- Next and previous buttons -->
            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        </div>
        <br>
        
        <!-- The dots/circles -->
        <div style="text-align:center">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div> 
    </div>
    <div id ="footer-container"></div>
</body>
</html>
