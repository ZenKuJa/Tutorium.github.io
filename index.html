<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tutorium Programmierung 2</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script.js"></script>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .header {
            padding: 80px;
            text-align: center;
            background-color: #1abc9c;
            color: white
        }

        .header h1 {
            font-size: 40px
        }

        .navbar{
            overflow: hidden;
            background-color: #333;
        }

        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        .navbar a.right {
            float: right;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }

        * {
            box-sizing: border-box;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
        }

        .side {
            flex: 30%;
            background-color: #f1f1f1;
            padding: 20px;
        }

        .main {
            flex: 70%;
            background-color: white;
            padding: 20%;
        }

        @media screen and (max-width: 700px) {
            .row {
                flex-direction: column;
            }
        }

        @media screen and (max-width: 400px) {
            .navbar a {
                float: none;
                width: 100%;
            }
        }

        .footer {
            overflow: hidden;
            background: #333;
            display: flex;
            justify-content: center;
        }

        .footer a {
            float: left;
            display: block;
            color: white;
            text-decoration: none;
            padding: 20px;
            text-align: center;
        }

        .footer a:hover{
            background-color: #ddd;
            color: black;
        }

        @media screen and (max-width: 400px){
            .footer {
                flex-direction: column;
        }
        }

    </style>
</head>
<body>
    <div class="header">
        <h1>My Website</h1>
        <p>A Website created by me.</p>
    </div>
    <div class="navbar">
        <a href="#">Dokumentation</a>
        <a href="#">Präsentation</a>
        <a href="#">Übungen</a>
        <a href="#" class="right">Home</a>
    </div>
    <div class="row">
        <div class="side">
        </div>
        <div class="main"></div>
    </div>
    <!-- <div class="footer">
        <a href="#">About</a>
        <a href="#">Impressum</a>
        <a href="#">Contact</a>
        <a href="#">Copyright</a>
    </div> -->
    <div id ="footer-container">
    </div>
</body>
</html>
