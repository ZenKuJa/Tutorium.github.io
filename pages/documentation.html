<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tutorium Programmierung 2</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="../src/componentLoader.js"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .page_content {
            text-align: center;
            display: flex;
        }

        * {
            box-sizing: border-box;

        }

        /* Style the tab */
        .tab {
            float: left;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        /* Style the buttons inside the tab */
        .tab button {
            display: block;
            background-color: inherit;
            color: black;
            padding: 22px 16px;
            width: 100%;
            border: none;
            outline: none;
            text-align: left;
            cursor: pointer;
            font-size: 17px;
        }

        /* Change background color of buttons on hover */
        .tab button:hover {
            background-color: #ddd;
        }

        /* Create an active/current "tab button" class */
        .tab button.active {
            background-color: #ccc;
        }

        /* Style the tab content */
        .tabcontent {
            float: left;
            padding:  12px;
            border: 1px solid #ccc;
            width: auto;
            border-left: none;
            height: auto;
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <div id="header-container"></div>
    <div id="navbar-container"></div>

    <div class="page_content">
        <div class="tab">
            <button class="tablinks" onclick="openCity(event, 'GitHub')" id="defaultOpen">GitHub</button>
            <button class="tablinks" onclick="openCity(event, 'Recursion')">Recursion</button>
            <button class="tablinks" onclick="openCity(event, 'BubbleSort')">BubbleSort</button>
        </div>

        <div id="GitHub" class="tabcontent">
            <h3>GitHub</h3>
            <p>Lovely piece of software for version controll.</p>
        </div>

        <div id="Recursion" class="tabcontent">
            <h3>Recursion</h3>
            <p>Function that calls it self if the base case is not met.</p> 
        </div>

        <div id="BubbleSort" class="tabcontent">
            <h3>BubbleSort</h3>
            <p>Biggest element in the unsorted list part rises to the top. Just like... bubbles</p>
        </div>
    </div>

    <div id ="footer-container"></div>

    <script>
        function openCity(evt, cityName) {
          var i, tabcontent, tablinks;
          tabcontent = document.getElementsByClassName("tabcontent");
          for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
          }
          tablinks = document.getElementsByClassName("tablinks");
          for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
          }
          document.getElementById(cityName).style.display = "block";
          evt.currentTarget.className += " active";
        }
        
        // Get the element with id="defaultOpen" and click on it
        document.getElementById("defaultOpen").click();
    </script>
</body>
</html>
